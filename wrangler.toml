name = "echo-compliance-auditor"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "echo-compliance-auditor"
database_id = "6236966f-61a4-4a9e-b8ed-8475a620d4c8"

[[kv_namespaces]]
binding = "CACHE"
id = "959e1694dbfc435b8584c0bf04fb32d4"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ALERT_ROUTER"
service = "echo-alert-router"

[[services]]
binding = "SERVICE_REGISTRY"
service = "echo-service-registry"

[triggers]
crons = ["0 4 * * *", "0 0 * * 1"]

[vars]
WORKER_VERSION = "1.0.0"
WORKER_NAME = "echo-compliance-auditor"
